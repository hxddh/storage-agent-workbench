name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI gates: frontend build + sidecar tests. Phase 08 added an informational
# PyInstaller packaging job (ubuntu). Phase 09 adds a real macOS desktop build
# job (Rust + sidecar one-dir + cargo check/build). Full .app bundling and
# code signing / notarization are intentionally NOT performed (see docs/release.md).
#
# CI requires NO AWS/BOS/MinIO credentials, NO OPENAI_API_KEY, NO real keyring
# secrets, NO signing cert / Apple developer account, NO Vercel token, and NO
# GUI desktop session.

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      # Lint gate. Currently an alias for `tsc --noEmit` (see frontend/package.json);
      # a real eslint flat config is a follow-up so this stays a safe, green gate.
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  sidecar:
    name: Sidecar import & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app
      - name: Import check
        run: python -c "import app.main; print(app.main.SERVICE_NAME)"
      - name: Run tests
        run: pytest -q

  package-sidecar:
    name: Package sidecar (informational)
    runs-on: ubuntu-latest
    # Heavy/environment-sensitive bundling; never block merges on it.
    continue-on-error: true
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev + packaging extras)
        run: pip install -e ".[dev]" -e ".[packaging]"
      - name: Build packaged sidecar (PyInstaller)
        run: python packaging/build_sidecar.py
      - name: Smoke test packaged sidecar (no AWS / no OPENAI_API_KEY)
        run: python packaging/smoke_test_sidecar.py

  desktop-build-macos:
    name: Desktop build (macOS / Apple Silicon)
    runs-on: macos-14  # Apple Silicon -> target aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sidecar deps (dev + packaging)
        run: pip install -e "./sidecar[dev]" -e "./sidecar[packaging]"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build sidecar one-dir + stage resource
        run: python3 scripts/build-sidecar-for-tauri.py

      - name: cargo check
        run: cd src-tauri && cargo check

      - name: cargo build (compile + link desktop binary)
        run: cd src-tauri && cargo build

      - name: cargo tauri build (unsigned .app / dmg)
        run: cd src-tauri && cargo tauri build
        # No signing cert / Apple developer account / notarization. The bundle is
        # UNSIGNED; Gatekeeper warns on first open (see docs/release.md). A
        # headless CI runner cannot launch the GUI — that is verified manually.

      - name: Package .app artifact
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -ry storage-agent-workbench-macos-app.zip ./*.app

      - name: Upload macOS bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storage-agent-workbench-macos-arm64
          path: |
            src-tauri/target/release/bundle/macos/*.zip
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Runtime verification (structure + sidecar /health + best-effort launch)
        run: bash scripts/verify-runtime-macos.sh

      - name: Note on signing / GUI
        run: |
          echo "Built an UNSIGNED macOS .app (+ DMG if the bundler produced one)."
          echo "No code signing / notarization (no Apple developer account)."
          echo "GUI launch is not exercised on the headless runner; it is verified"
          echo "manually on a local macOS machine. See docs/release.md."

  # Phase 11: Linux x64 — EXPERIMENTAL (continue-on-error so it reports
  # pass/partial/blocker honestly without blocking merges).
  desktop-build-linux-x64:
    name: Desktop build (Linux x64) [experimental]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev build-essential curl wget file libssl-dev \
            xvfb

      - name: Install sidecar deps (dev + packaging)
        run: pip install -e "./sidecar[dev]" -e "./sidecar[packaging]"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build sidecar one-dir + stage resource
        run: python3 scripts/build-sidecar-for-tauri.py

      - name: Smoke test packaged sidecar (no AWS / no OPENAI_API_KEY)
        run: cd sidecar && python packaging/smoke_test_sidecar.py

      - name: cargo check
        run: cd src-tauri && cargo check

      - name: cargo build
        run: cd src-tauri && cargo build

      - name: cargo tauri build (.deb; unsigned)
        run: cd src-tauri && cargo tauri build --bundles deb

      - name: Verify artifacts
        run: python3 scripts/verify-desktop-artifacts.py

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storage-agent-workbench-linux-x64
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Runtime verification (structure + sidecar /health; launch skipped headless)
        # GUI launch is skipped on the headless CI runner (it is verified on a
        # real desktop). Required checks: app exe, bundled sidecar, /health, data dir.
        run: bash scripts/verify-runtime-linux.sh --skip-launch

  # Phase 11: Windows x64 — EXPERIMENTAL (continue-on-error).
  desktop-build-windows-x64:
    name: Desktop build (Windows x64) [experimental]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sidecar deps (dev + packaging)
        run: pip install -e "./sidecar[dev]" -e "./sidecar[packaging]"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build frontend
        run: cd frontend; npm ci; npm run build

      - name: Build sidecar one-dir + stage resource
        run: python scripts/build-sidecar-for-tauri.py

      - name: Smoke test packaged sidecar (no AWS / no OPENAI_API_KEY)
        run: cd sidecar; python packaging/smoke_test_sidecar.py

      - name: cargo check
        run: cd src-tauri; cargo check

      - name: cargo build
        run: cd src-tauri; cargo build

      - name: cargo tauri build (NSIS installer; unsigned)
        run: cd src-tauri; cargo tauri build --bundles nsis

      - name: Verify artifacts
        run: python scripts/verify-desktop-artifacts.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storage-agent-workbench-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Runtime verification (structure + sidecar /health + launch)
        run: powershell -ExecutionPolicy Bypass -File scripts/verify-runtime-windows.ps1
