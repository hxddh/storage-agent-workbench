name: Release

# Manual, dispatch-only release publisher. Builds the desktop app for macOS
# (arm64), Linux (x64 .deb) and Windows (x64 NSIS .exe), and uploads them to one
# GitHub Release with stable-named assets + per-platform SHA256SUMS. Builds are
# UNSIGNED/ad-hoc (no Apple notarization, no Windows Authenticode) — see
# docs/signing.md. The bundle version is stamped from the release tag.
#
# Usage from an up-to-date main:
#   git tag v0.19.4 && git push origin v0.19.4
#   gh workflow run release.yml -f version=v0.19.4 -f ref=v0.19.4 \
#     -f prerelease=false -f draft=false

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version / tag name (e.g. v0.19.4)"
        required: true
        default: "v0.19.4"
      ref:
        description: "Git ref (branch, tag, or SHA) to build from"
        required: true
        default: "main"
      prerelease:
        description: "Mark the release as a prerelease"
        required: true
        default: "false"
      draft:
        description: "Create the release as a draft (review before publishing)"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  # Create the (empty) GitHub Release first so the parallel platform jobs only
  # upload to it — no create race.
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          # Tag the built commit: every platform job checks out `inputs.ref`, so the
          # release target must be that same ref — not the workflow's own $GITHUB_SHA
          # (the commit the dispatch ran against), which can differ from `ref`.
          REF="${{ github.event.inputs.ref }}"
          VER_NO_V="${VERSION#v}"
          # Always create HIDDEN (draft): the three platform jobs upload assets in
          # parallel, and a release must never be visible while half-populated (or
          # permanently partial if one platform fails). The `finalize` job flips it
          # to published only after all three succeed. A run that explicitly asked
          # for --draft simply never gets finalized, so it stays a draft.
          FLAGS="--draft"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then FLAGS="$FLAGS --prerelease"; fi

          # Per-version "What's changed" pulled from this version's CHANGELOG section
          # so each release has its own real notes (not boilerplate).
          CHANGES="$(awk -v v="## [$VER_NO_V]" '
            /^## \[/ { if (found) exit; if (index($0, v) == 1) { found=1; next } }
            found { print }
          ' CHANGELOG.md)"
          [ -z "$(printf "%s" "$CHANGES" | tr -d "[:space:]")" ] && CHANGES="See [CHANGELOG.md](CHANGELOG.md)."

          INSTALL="### Install

          Builds are **unsigned / ad-hoc** (no Apple notarization, no Windows Authenticode). Verify downloads against the \`SHA256SUMS-*.txt\` files.

          - **macOS (arm64):** open the .dmg, drag to Applications. First launch shows a Gatekeeper prompt — right-click the app → **Open**, or run \`xattr -dr com.apple.quarantine \"/Applications/Storage Agent Workbench.app\"\`. It starts in a few seconds.
          - **Linux (x64):** \`sudo apt install ./storage-agent-workbench-$VERSION-linux-x64.deb\`
          - **Windows (x64):** run the \`-setup.exe\`; if SmartScreen warns, choose **More info → Run anyway**.

          Prompt-free signed builds: see [docs/signing.md](docs/signing.md)."

          NOTES="## What's changed
          $CHANGES

          $INSTALL"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; reusing."
          else
            gh release create "$VERSION" --target "$REF" --title "$VERSION" --notes "$NOTES" $FLAGS
          fi

  release-macos-arm64:
    name: Release macOS arm64 (ad-hoc)
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Stamp BEFORE `pip install`: the sidecar reports its version via
      # importlib.metadata, which is frozen from pyproject.toml at install time.
      # Installing first would bake in the pre-stamp version (0.23.0) and the
      # packaged /health + OpenAPI would report it instead of the release tag.
      - name: Stamp bundle version from tag
        run: python3 scripts/stamp-version.py "${{ github.event.inputs.version }}"
      - name: Install sidecar deps (dev + packaging)
        run: pip install -e "./sidecar[dev]" -e "./sidecar[packaging]"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"
      - name: Build ad-hoc-sealed macOS bundle (.app + DMG)
        run: bash scripts/build-macos-app-bundle.sh
      - name: Collect + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          OUT="release-assets"; rm -rf "$OUT"; mkdir -p "$OUT"
          APP="$(ls -d src-tauri/target/release/bundle/macos/*.app 2>/dev/null | head -1 || true)"
          [ -n "$APP" ] || { echo "ERROR: no .app produced"; exit 1; }
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$OUT/storage-agent-workbench-$VERSION-macos-arm64.app.zip"
          DMG="$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1 || true)"
          [ -n "$DMG" ] && cp "$DMG" "$OUT/storage-agent-workbench-$VERSION-macos-arm64.dmg" || echo "no DMG; shipping .app.zip"
          ( cd "$OUT" && shasum -a 256 storage-agent-workbench-* > SHA256SUMS-macos-arm64.txt && cat SHA256SUMS-macos-arm64.txt )
          gh release upload "$VERSION" "$OUT"/* --clobber

  release-linux-x64:
    name: Release Linux x64 (.deb)
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev build-essential curl wget file libssl-dev
      # Stamp BEFORE `pip install` (importlib.metadata freezes the version at
      # install time — see the macOS job note).
      - name: Stamp bundle version from tag
        run: python3 scripts/stamp-version.py "${{ github.event.inputs.version }}"
      - name: Install sidecar deps (dev + packaging)
        run: pip install -e "./sidecar[dev]" -e "./sidecar[packaging]"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - name: Build sidecar one-dir + stage resource
        run: python3 scripts/build-sidecar-for-tauri.py
      - name: cargo tauri build (.deb; unsigned)
        run: cd src-tauri && cargo tauri build --bundles deb
      - name: Collect + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          OUT="release-assets"; rm -rf "$OUT"; mkdir -p "$OUT"
          DEB="$(ls src-tauri/target/release/bundle/deb/*.deb 2>/dev/null | head -1 || true)"
          [ -n "$DEB" ] || { echo "ERROR: no .deb produced"; exit 1; }
          cp "$DEB" "$OUT/storage-agent-workbench-$VERSION-linux-x64.deb"
          ( cd "$OUT" && sha256sum storage-agent-workbench-* > SHA256SUMS-linux-x64.txt && cat SHA256SUMS-linux-x64.txt )
          gh release upload "$VERSION" "$OUT"/* --clobber

  release-windows-x64:
    name: Release Windows x64 (NSIS)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Stamp BEFORE `pip install` (importlib.metadata freezes the version at
      # install time — see the macOS job note).
      - name: Stamp bundle version from tag
        shell: bash
        run: python scripts/stamp-version.py "${{ github.event.inputs.version }}"
      - name: Install sidecar deps (dev + packaging)
        run: pip install -e "./sidecar[dev]" -e "./sidecar[packaging]"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"
      - name: Build frontend
        run: cd frontend; npm ci; npm run build
      - name: Build sidecar one-dir + stage resource
        run: python scripts/build-sidecar-for-tauri.py
      - name: cargo tauri build (NSIS installer; unsigned)
        run: cd src-tauri; cargo tauri build --bundles nsis
      - name: Collect + upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          OUT="release-assets"; rm -rf "$OUT"; mkdir -p "$OUT"
          EXE="$(ls src-tauri/target/release/bundle/nsis/*.exe 2>/dev/null | head -1 || true)"
          [ -n "$EXE" ] || { echo "ERROR: no NSIS .exe produced"; exit 1; }
          cp "$EXE" "$OUT/storage-agent-workbench-$VERSION-windows-x64-setup.exe"
          ( cd "$OUT" && sha256sum storage-agent-workbench-* > SHA256SUMS-windows-x64.txt && cat SHA256SUMS-windows-x64.txt )
          gh release upload "$VERSION" "$OUT"/* --clobber

  # Publish (undraft) the release ONLY after all three platform jobs succeeded,
  # so a run that fails on any platform leaves a hidden draft (reviewable /
  # deletable) rather than a permanently half-populated public release. `needs`
  # gates this on every platform job passing; a requested draft (draft=true) skips
  # finalize and stays a draft on purpose.
  finalize:
    name: Publish release
    needs: [release-macos-arm64, release-linux-x64, release-windows-x64]
    if: ${{ github.event.inputs.draft != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Publish now that all platforms uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          gh release edit "$VERSION" --draft=false
          echo "Published release $VERSION (all platform assets present)."
