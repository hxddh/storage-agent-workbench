[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "storage-agent-sidecar"
version = "0.6.0"
description = "Local FastAPI sidecar for Storage Agent Workbench (Phase 06: bucket config review)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "keyring>=24",
    "boto3>=1.34",
    "botocore>=1.34",
    "duckdb>=0.10",
    "pyarrow>=14",
    "pandas>=2.0",
    "python-multipart>=0.0.9",
]

# NOTE (Phase 05): Adds DuckDB/PyArrow/pandas for local access-log and inventory
# analysis, and python-multipart for dataset uploads. The agent runtime (OpenAI
# Agents SDK) is intentionally still NOT added.

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
]

[tool.setuptools]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
