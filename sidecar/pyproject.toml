[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "storage-agent-sidecar"
version = "0.3.0"
description = "Local FastAPI sidecar for Storage Agent Workbench (Phase 03: read-only S3 tools)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "keyring>=24",
    "boto3>=1.34",
    "botocore>=1.34",
]

# NOTE (Phase 03): Adds boto3/botocore for a whitelisted, READ-ONLY S3 tool
# layer. The dependencies for the agent runtime (OpenAI Agents SDK) and analysis
# (duckdb/pyarrow/pandas) are intentionally NOT added yet. They will be
# introduced in later phases per docs/roadmap.md.

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
]

[tool.setuptools]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
