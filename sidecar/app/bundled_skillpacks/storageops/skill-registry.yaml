# StorageOps Skill Registry v0.7.0

# Machine-readable metadata for all StorageOps skills.
# Skills are auto-discovered by Pi from the skills/ directory.
# This registry drives documentation routing and skill metadata.

version: "0.4"
contract: "StorageOps Skill Contract v6"

skills:
  - name: storageops-triage
    path: skills/storageops-triage/SKILL.md
    maturity: core
    mode: light_heavy
    priority: 0
    auto_route: true
    description: >
      First-contact triage for any object storage issue. Classifies the
      problem domain, assesses severity and evidence completeness, and
      routes to the appropriate specialist skill.
    trigger_keywords:
      - "object storage"
      - "S3 error"
      - "storage issue"
      - "bucket issue"
    domains: [triage]
    recommended_tools: [scan_secrets, detect_domain, search_memory]

